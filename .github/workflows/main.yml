name: MLOps CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  ML_ENGINE_IMAGE: ids-ml-engine 
  GO_API_IMAGE: ids-go-api 
  IMAGE_TAG: ${{github.sha}}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build, Start & Integration Test 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build ML Engine image 
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./python-engine 
          push: false
          tags: ${{env.ML_ENGINE_IMAGE}}:${{env.IMAGE_TAG}}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      
      - name: Build Go API image
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./go-api
          push: false
          tags: ${{env.GO_API_IMAGE}}:${{env.IMAGE_TAG}}
          cache-from: type=gha
          cache-to: type=gha,mode = max
          load: true 


      - name: Start services with Docker Compose
        run: |
          export ML_ENGINE_IMAGE=${{env.ML_ENGINE_IMAGE}}
          export GO_API_IMAGE=${{env.GO_API_IMAGE}}
          export IMAGE_TAG=${{env.IMAGE_TAG}}
          docker compose up -d 

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for ML engine to be healthy..."
          max_retries=30
          count=0
          until curl -sf http://localhost:8080/health > /dev/null; do 
            count=$((count + 1))
            if [ $count -ge $max_retries ]; then 
              echo "Services failed to become healthy after ${max_retries} attempts"
              docker compose logs
              exit 1
            fi 
            echo "Attempt ${count}/${max_retries} - waiting 3s..."
            sleep 3
          done 

          echo "Services are healthy!"

      - name: Run Integration tests
        run: |
          echo "=== Test 1: Gateway Health Check ==="
          HEALTH=$(curl -sf http://localhost:8080/health)
          echo "$HEALTH"
          echo "$HEALTH" | grep -q '"status":"healthy"' || \
            { echo "FAIL: health check failed"; exit 1; }
          echo "PASS"

          echo "=== Test 2: Normal Traffic Prediction ==="
          NORMAL=$(curl -sf -X POST http://localhost:8080/predict \
            -H "Content-Type: application/json" \
            -d '{"features": [0.5, 0.4, 0.6, 0.5, 0.5, 0.5]}')
          echo "$NORMAL"
          echo "$NORMAL" | grep -q '"Prediction":"normal"' || \
            { echo "FAIL: normal prediction failed"; exit 1; }
          echo "PASS"

          echo "=== Test 3: Anomaly Detection ==="
          ANOMALY=$(curl -sf -X POST http://localhost:8080/predict \
            -H "Content-Type: application/json" \
            -d '{"features": [9999.0, 8888.0, 7777.0, 6666.0, 5555.0, 4444.0]}')
          echo "$ANOMALY"
          echo "$ANOMALY" | grep -q '"Prediction":"anomaly"' || \
            { echo "FAIL: anomaly detection failed"; exit 1; }
          echo "PASS"

          echo "=== Test 4: Input Validation ==="
          # curl -f fails on 4xx/5xx, so we use -o to capture output
          # and check the HTTP status code manually
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8080/predict \
            -H "Content-Type: application/json" \
            -d '{"features": [1.0, 2.0]}')
          echo "HTTP Status: $HTTP_STATUS"
          [ "$HTTP_STATUS" = "400" ] || \
            { echo "FAIL: expected 400, got $HTTP_STATUS"; exit 1; }
          echo "PASS"

          echo "=== All tests passed ==="

      - name: Print service logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down services
        if: always()
        run: docker compose down 

  security-scan:
    name: Trivy Security Scan 
    runs-on: ubuntu-latest

    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action

      - name: Rebuild ML Engine image for scanning
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./python-engine
          push: false
          tags: ${{env.ML_ENGINE_IMAGE}}:${{env.IMAGE_TAG}}
          cache-from: type=gha
          load: true

      - name: Rebuild Go API image for scanning
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./go-api
          push: false
          tags: ${{env.GO_API_IMAGE}}:${{env.IMAGE_TAG}}
          cache-from: type=gha
          load: true

      - name: Scan ML Engine image with Trivy 
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{env.ML_ENGINE_IMAGE}}:${{env.IMAGE_TAG}}
          format: table
          exit-code: 1
          ignore-unfixed: true 
          vuln-type: os, library
          severity: CRITICAL, HIGH

      - name: Scan Go API image with Trivy 
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{env.GO_API_IMAGE}}:${{env.IMAGE_TAG}}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os, library
          severity: CRITICAL, HIGH

      - name: Generate SARIF report for ML Engine 
        uses: aquasecurity/trivy-action@0.30.0
        if: always()
        with:
          image-ref: ${{env.ML_ENGINE_IMAGE}}:${{env.IMAGE_TAG}}
          format: sarif
          output: trivy-ml-engine.sarif
          ignore-unfixed: true
          vuln-type: os, library
          severity: CRITICAL, HIGH 

      - name: Generate SARIF report for Go API
        uses: aquasecurity/trivy-action@0.30.0
        if: always()
        with: 
          image-ref: ${{env.GO_API_IMAGE}}:${{env.IMAGE_TAG}}
          format: sarif
          output: trivy-go-api.sarif
          ignore-unfixed: true 
          vuln-type: os, library 
          severity: CRITICAL, HIGH 

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3 
        if: always()
        with:
          sarif_file: |
            trivy-ml-engine.sarif
            trivy-go-api.sarif

  push-to-registry:
    name: Push Images to Docker Hub 
    runs-on: ubuntu-latest

    needs: [build-and-test, security-scan]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo 
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx 
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to Docker Hub
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

            # Build AND push ML Engine with two tags:
            # 1. git SHA tag: immutable, traceable to exact commit
            # 2. "latest" tag: always points to most recent main build
      - name: Build and push ML Engine
        uses: docker/build-push-action@v6.15.0
        with:
          context: ./python-engine
                # push: true this time — we're actually publishing
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.ML_ENGINE_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.ML_ENGINE_IMAGE }}:latest
          cache-from: type=gha

      - name: Build and push Go API
        uses: docker/build-push-action@v6.15.0
        with:
         context: ./go-api
         push: true
         tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.GO_API_IMAGE }}:${{ env.IMAGE_TAG }}
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.GO_API_IMAGE }}:latest
         cache-from: type=gha

            # Print the exact image references that were pushed.
            # This output becomes your deployment artifact reference —
            # whatever deploys next uses these exact SHA-tagged images.
      - name: Print pushed image references
        run: |
          echo "================================================"
          echo "Images successfully pushed to Docker Hub"
          echo "================================================"
          echo "ML Engine:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.ML_ENGINE_IMAGE }}:${{ env.IMAGE_TAG }}"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.ML_ENGINE_IMAGE }}:latest"
          echo ""
          echo "Go API:"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.GO_API_IMAGE }}:${{ env.IMAGE_TAG }}"
          echo "  ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.GO_API_IMAGE }}:latest"
          echo "================================================"